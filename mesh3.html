<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P2P Gun Chat</title>

<script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
    display:flex;
    flex-direction:column;
    height:100vh;
}

header{
    padding:10px;
    background:#1c1c1c;
    display:flex;
    gap:5px;
}

input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#00c853;
    color:white;
}

#messages{
    flex:1;
    overflow-y:auto;
    padding:10px;
}

.msg{
    background:#222;
    margin-bottom:8px;
    padding:8px;
    border-radius:10px;
}

footer{
    display:flex;
    gap:5px;
    padding:10px;
    background:#1c1c1c;
}
</style>
</head>
<body>

<header>
    <input id="room" placeholder="Комната">
    <button onclick="joinRoom()">Войти</button>
</header>

<div id="messages"></div>

<footer>
    <input id="message" placeholder="Сообщение">
    <button onclick="sendMessage()">➤</button>
</footer>

<script>
const gun = Gun({
    peers: [
        "https://gun-manhattan.herokuapp.com/gun",
        "https://gunjs.herokuapp.com/gun"
    ]
});

let currentRoom = null;
let username = "user_" + Math.floor(Math.random()*9999);

function joinRoom() {

    document.getElementById("messages").innerHTML = "";

    currentRoom = gun.get("rooms").get(
        document.getElementById("room").value
    );

    currentRoom.map().on((data,id)=>{

        if(!data || !data.text) return;

        if(document.getElementById(id)) return;

        const div = document.createElement("div");
        div.className = "msg";
        div.id = id;
        div.innerHTML =
            "<b>"+data.user+"</b><br>"+data.text;

        document.getElementById("messages")
            .appendChild(div);

        window.scrollTo(0,document.body.scrollHeight);
    });
}

function sendMessage(){

    if(!currentRoom) return alert("Сначала войдите в комнату");

    const text =
        document.getElementById("message").value.trim();

    if(!text) return;

    currentRoom.set({
        user: username,
        text: text,
        time: Date.now()
    });

    document.getElementById("message").value = "";
}
</script>

</body>
</html>
