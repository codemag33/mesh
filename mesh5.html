<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>P2P Chat</title>

<script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

#top{
display:flex;
padding:10px;
gap:5px;
background:#1a1a1a;
}

#messages{
flex:1;
overflow:auto;
padding:10px;
}

.msg{
background:#222;
padding:8px;
margin-bottom:8px;
border-radius:10px;
word-break:break-word;
}

#bottom{
display:flex;
padding:10px;
gap:5px;
background:#1a1a1a;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:8px;
}

button{
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

.system{
color:#8bc34a;
}
</style>
</head>
<body>

<div id="top">
<input id="room" placeholder="Комната">
<button onclick="joinRoom()">Войти</button>
</div>

<div id="messages"></div>

<div id="bottom">
<input id="message" placeholder="Сообщение">
<button onclick="sendMessage()">➤</button>
</div>

<script>

const gun = Gun([
'https://gun.eco/gun'
]);

const nick =
'User' +
Math.floor(Math.random()*10000);

let room = null;
let seen = {};

function add(text, cls='msg'){
const div=document.createElement('div');
div.className=cls;
div.innerHTML=text;

const box=document.getElementById('messages');
box.appendChild(div);
box.scrollTop=box.scrollHeight;
}

function joinRoom(){

const roomName =
document.getElementById('room').value.trim();

if(!roomName){
alert('Введите комнату');
return;
}

document.getElementById('messages').innerHTML='';
seen={};

room =
gun.get('rooms').get(roomName);

add(
'Подключено к комнате: <b>'+roomName+'</b>',
'system'
);

room.map().on((data,id)=>{

if(!data) return;
if(!data.text) return;
if(seen[id]) return;

seen[id]=true;

add(
'<b>'+data.user+
'</b><br>'+
data.text
);

});
}

function sendMessage(){

if(!room){
alert('Сначала войдите в комнату');
return;
}

const input =
document.getElementById('message');

const text =
input.value.trim();

if(!text) return;

room.set({
user:nick,
text:text,
time:Date.now()
});

input.value='';
}

document
.getElementById('message')
.addEventListener('keydown',e=>{
if(e.key==='Enter'){
sendMessage();
}
});

</script>

</body>
</html>
