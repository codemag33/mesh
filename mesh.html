const swCode = `
const CACHE = 'mesh-v1';
const ASSETS = []; // dynamic-only cache

self.addEventListener('install', e => {
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
    ).then(() => self.clients.claim())
  );
});
self.addEventListener('fetch', e => {
  // Network first, fall back to cache
  e.respondWith(
    fetch(e.request).then(res => {
      const clone = res.clone();
      caches.open(CACHE).then(c => c.put(e.request, clone));
      return res;
    }).catch(() => caches.match(e.request))
  );
});
`;

if ('serviceWorker' in navigator) {
  const swBlob = new Blob([swCode], {type:'text/javascript'});

const {useState, useEffect, useRef, useCallback} = React;

// ════════════════════════════════════════════════════════════
// CRYPTO — secp256k1 + schnorr (без внешних библиотек)
// ════════════════════════════════════════════════════════════
async function sha256(data){
  const buf=typeof data==='string'?new TextEncoder().encode(data):data;
  return new Uint8Array(await crypto.subtle.digest('SHA-256',buf));
}
const toHex=b=>Array.from(b).map(x=>x.toString(16).padStart(2,'0')).join('');
const fromHex=h=>{const a=new Uint8Array(h.length/2);for(let i=0;i<h.length;i+=2)a[i/2]=parseInt(h.slice(i,i+2),16);return a;};

const P=0xFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFEFFFFFC2Fn;
const N=0xFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFEBAAEDCE6AF48A03BBFD25E8CD0364141n;
const Gx=0x79BE667EF9DCBBAC55A06295CE870B07029BFCDB2DCE28D959F2815B16F81798n;
const Gy=0x483ADA7726A3C4655DA4FBFC0E1108A8FD17B448A68554199C47D08FFB10D4B8n;
const mod=(a,b=P)=>((a%b)+b)%b;
const pow=(b,e,m)=>{let r=1n;b%=m;while(e>0n){if(e&1n)r=r*b%m;b=b*b%m;e>>=1n;}return r;};
class Pt{
  constructor(x,y){this.x=x;this.y=y;}
  static Z=new Pt(0n,0n);
  add(o){
    if(this===Pt.Z)return o;if(o===Pt.Z)return this;
    if(this.x===o.x){if(this.y!==o.y)return Pt.Z;const l=mod(3n*this.x*this.x*pow(2n*this.y,P-2n,P));const x3=mod(l*l-2n*this.x);return new Pt(x3,mod(l*(this.x-x3)-this.y));}
    const l=mod((o.y-this.y)*pow(o.x-this.x,P-2n,P));const x3=mod(l*l-this.x-o.x);return new Pt(x3,mod(l*(this.x-x3)-this.y));
  }
  mul(s){let r=Pt.Z,p=this;s=mod(s,N);while(s>0n){if(s&1n)r=r.add(p);p=p.add(p);s>>=1n;}return r;}
}
const G=new Pt(Gx,Gy);
const bi=b=>{let n=0n;for(const x of b)n=(n<<8n)|BigInt(x);return n;};
const b32=n=>{const a=new Uint8Array(32);for(let i=31;i>=0;i--){a[i]=Number(n&0xffn);n>>=8n;}return a;};

async function genKeypair(){
  const pb=crypto.getRandomValues(new Uint8Array(32));
  pb[0]&=0x7f;
  const priv=bi(pb);
  const pub=G.mul(priv);
  return{priv:toHex(pb),pubkey:toHex(b32(pub.x))};
}

async function schnorrSign(msgHash,privHex){
  const pb=fromHex(privHex);
  let priv=bi(pb);
  const Pp=G.mul(priv);
  if(Pp.y%2n!==0n)priv=N-priv;
  const cc=new Uint8Array(64);cc.set(pb,0);cc.set(msgHash,32);
  let k=mod(bi(await sha256(cc)),N);if(k===0n)k=1n;
  const R=G.mul(k);if(R.y%2n!==0n)k=N-k;
  const rb=b32(R.x),ppb=b32(Pp.x);
  const ei=new Uint8Array(96);ei.set(rb,0);ei.set(ppb,32);ei.set(msgHash,64);
  const e=mod(bi(await sha256(ei)),N);
  const s=mod(k+e*priv,N);
  const sig=new Uint8Array(64);sig.set(rb,0);sig.set(b32(s),32);
  return toHex(sig);
}

async function buildEvent(kind,content,tags,privHex,pubkey){
  const created_at=Math.floor(Date.now()/1000);
  const arr=[0,pubkey,created_at,kind,tags,content];
  const idBytes=await sha256(JSON.stringify(arr));
  const id=toHex(idBytes);
  const sig=await schnorrSign(idBytes,privHex);
  return{id,pubkey,created_at,kind,tags,content,sig};
}

// ════════════════════════════════════════════════════════════
// RELAY POOL
// ════════════════════════════════════════════════════════════
const RELAYS=["wss://relay.damus.io","wss://nos.lol","wss://relay.nostr.band"];
const APP_TAG=["t","mesh-chat-v1"];
const CHANNEL_KIND=40,MSG_KIND=42;

class RelayPool{
  constructor(urls,onEvent,onStatus){
    this.urls=urls;this.onEvent=onEvent;this.onStatus=onStatus;
    this.sockets={};this.statuses={};this.subs={};
    for(const u of urls){this.statuses[u]="connecting";this._open(u);}
    onStatus({...this.statuses});
  }
  _open(url){
    try{
      const ws=new WebSocket(url);this.sockets[url]=ws;
      ws.onopen=()=>{this.statuses[url]="ok";this.onStatus({...this.statuses});for(const[id,f]of Object.entries(this.subs))ws.send(JSON.stringify(["REQ",id,f]));};
      ws.onclose=()=>{this.statuses[url]="err";this.onStatus({...this.statuses});setTimeout(()=>this._open(url),6000);};
      ws.onerror=()=>{this.statuses[url]="err";this.onStatus({...this.statuses});};
      ws.onmessage=e=>{try{const m=JSON.parse(e.data);if(m[0]==="EVENT")this.onEvent(m[2]);}catch{}};
    }catch{}
  }
  subscribe(id,filter){this.subs[id]=filter;for(const ws of Object.values(this.sockets))if(ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify(["REQ",id,filter]));}
  publish(ev){const m=JSON.stringify(["EVENT",ev]);for(const ws of Object.values(this.sockets))if(ws.readyState===WebSocket.OPEN)ws.send(m);}
  close(){for(const ws of Object.values(this.sockets))ws.close();}
}

// ════════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════════
const shortKey=h=>h.slice(0,6)+'…'+h.slice(-4);
const fmtTime=ts=>{const d=new Date(ts*1000);return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});};
const fmtDate=ts=>{const d=new Date(ts*1000),n=new Date();return d.toDateString()===n.toDateString()?'сегодня':d.toLocaleDateString('ru',{day:'numeric',month:'short'});};
const STORAGE_KEY='mesh_identity_v1';

// ════════════════════════════════════════════════════════════
// APP
// ════════════════════════════════════════════════════════════
function App(){
  const [screen,setScreen]=useState('setup');
  const [nick,setNick]=useState('');
  const [kp,setKp]=useState(null);
  const [tab,setTab]=useState('threads');
  const [threads,setThreads]=useState({});
  const [msgs,setMsgs]=useState({});
  const [active,setActive]=useState(null);
  const [input,setInput]=useState('');
  const [relayStatus,setRelayStatus]=useState({});
  const [sending,setSending]=useState(false);
  const [showNew,setShowNew]=useState(false);
  const [newTitle,setNewTitle]=useState('');
  const [newBody,setNewBody]=useState('');
  const [showPwaHint,setShowPwaHint]=useState(false);
  const poolRef=useRef(null);
  const chatEndRef=useRef(null);
  const seenRef=useRef(new Set());
  const isIOS=/iPhone|iPad|iPod/.test(navigator.userAgent);
  const isAndroid=/Android/.test(navigator.userAgent);
  const isStandalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;

  // Load saved identity
  useEffect(()=>{
    try{
      const saved=localStorage.getItem(STORAGE_KEY);
      if(saved){const data=JSON.parse(saved);setNick(data.nick);setKp(data.kp);setShowPwaHint(!isStandalone);setScreen('main');}
    }catch{}
  },[]);

  async function handleStart(){
    if(!nick.trim())return;
    const keypair=await genKeypair();
    setKp(keypair);
    try{localStorage.setItem(STORAGE_KEY,JSON.stringify({nick:nick.trim(),kp:keypair}));}catch{}
    setShowPwaHint(!isStandalone);
    setScreen('main');
  }

  useEffect(()=>{
    if(screen!=='main'||!kp)return;
    const pool=new RelayPool(RELAYS,handleEvent,setRelayStatus);
    poolRef.current=pool;
    pool.subscribe('ch',{kinds:[CHANNEL_KIND],'#t':['mesh-chat-v1'],limit:50});
    pool.subscribe('ms',{kinds:[MSG_KIND],'#t':['mesh-chat-v1'],limit:300});
    return()=>pool.close();
  },[screen,kp]);

  function handleEvent(ev){
    if(!ev||!ev.id)return;
    if(seenRef.current.has(ev.id))return;
    seenRef.current.add(ev.id);
    if(ev.kind===CHANNEL_KIND){
      try{
        const meta=JSON.parse(ev.content);
        setThreads(p=>({...p,[ev.id]:{id:ev.id,title:meta.name||'Без названия',about:meta.about||'',pubkey:ev.pubkey,created_at:ev.created_at}}));
      }catch{}
    }else if(ev.kind===MSG_KIND){
      const et=ev.tags.find(t=>t[0]==='e');
      if(!et)return;
      const tid=et[1];
      setMsgs(p=>{const ex=p[tid]||[];return{...p,[tid]:[...ex,ev].sort((a,b)=>a.created_at-b.created_at)};});
    }
  }

  useEffect(()=>{chatEndRef.current?.scrollIntoView({behavior:'smooth'});},[msgs,active]);

  async function publishThread(){
    if(!newTitle.trim()||!kp)return;
    setSending(true);
    try{
      const content=JSON.stringify({name:newTitle.trim(),about:newBody.trim()});
      const ev=await buildEvent(CHANNEL_KIND,content,[APP_TAG],kp.priv,kp.pubkey);
      poolRef.current?.publish(ev);handleEvent(ev);
      setShowNew(false);setNewTitle('');setNewBody('');
      setActive(ev.id);setTab('chat');
    }catch(e){console.error(e);}
    setSending(false);
  }

  async function sendMsg(){
    if(!input.trim()||!active||!kp)return;
    const text=`${nick}: ${input.trim()}`;
    setSending(true);
    try{
      const ev=await buildEvent(MSG_KIND,text,[['e',active,'','root'],APP_TAG],kp.priv,kp.pubkey);
      poolRef.current?.publish(ev);handleEvent(ev);
      setInput('');
    }catch(e){console.error(e);}
    setSending(false);
  }

  function handleKey(e){if(e.key==='Enter'&&!e.shiftKey&&!isIOS&&!isAndroid){e.preventDefault();sendMsg();}}

  // ── Relay status bar
  const StatusBar=()=>(
    <div className="sbar">
      {RELAYS.map(url=>{
        const s=relayStatus[url]||'connecting';
        const name=url.replace('wss://','').split('.')[0];
        return <span key={url}><span className={`rdot ${s}`}/>{name}</span>;
      })}
    </div>
  );

  // ── PWA hint
  const PwaHint=()=>{
    if(isStandalone||!showPwaHint)return null;
    const hint=isIOS?'Нажми Share → «На экран Домой»':isAndroid?'Меню браузера → «Добавить на гл. экран»':'Можно установить как PWA';
    return(
      <div style={{padding:'8px 12px',background:'#111827',borderBottom:'1px solid #1e2d45'}}>
        <div className="pwa-hint" onClick={()=>setShowPwaHint(false)}>
          📲 {hint} &nbsp; <span style={{opacity:.6}}>✕</span>
        </div>
      </div>
    );
  };

  // ── Setup
  if(screen==='setup')return(
    <>
    <style>{S}</style>
    <div className="app">
      <div className="setup">
        <div className="logo">MESH</div>
        <div className="sub">Децентрализованный P2P мессенджер<br/>Без серверов · Без регистрации<br/>Только криптография</div>
        <div className="scard">
          <label>ИМЯ В СЕТИ</label>
          <input value={nick} onChange={e=>setNick(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleStart()} placeholder="Твой никнейм…" maxLength={20} autoFocus/>
          <button className="stbtn" onClick={handleStart} disabled={!nick.trim()}>Войти в сеть →</button>
        </div>
        <div style={{fontSize:11,color:'#4a5568',textAlign:'center',lineHeight:1.7}}>
          Ключи сохраняются на устройстве.<br/>Имя видят все в чате.
        </div>
      </div>
    </div>
    </>
  );

  // ── Main
  const threadList=Object.values(threads).sort((a,b)=>b.created_at-a.created_at);
  const activeMsgs=active?(msgs[active]||[]):[];
  const anyConnected=Object.values(relayStatus).some(s=>s==='ok');

  return(
    <>
    <style>{S}</style>
    <div className="app">
      {/* Header */}
      <div className="hdr">
        {tab==='chat'&&active
          ?<button className="back" onClick={()=>{setTab('threads');setActive(null);}}>←</button>
          :<div className={`hdot ${anyConnected?'':'off'}`}/>
        }
        <div className="htitle">
          {tab==='chat'&&active?(threads[active]?.title||'Чат'):'MESH'}
        </div>
        <div className="hkey">{nick} · {shortKey(kp.pubkey)}</div>
      </div>

      <StatusBar/>
      <PwaHint/>

      {/* Threads view */}
      {tab==='threads'&&<>
        <div className="threads">
          {threadList.length===0?(
            <div className="empty">
              <div className="eico">📡</div>
              <div>Подключаемся к сети…</div>
              <div style={{fontSize:11,marginTop:4}}>Темы появятся автоматически.<br/>Или создай первую — кнопка ➕</div>
            </div>
          ):threadList.map(t=>(
            <div key={t.id} className="tcard" onClick={()=>{setActive(t.id);setTab('chat');}}>
              <div className="ttitle">{t.title}</div>
              {t.about&&<div style={{fontSize:12,color:'#6b7a99',margin:'2px 0 6px'}}>{t.about}</div>}
              <div className="tmeta">
                <span>{shortKey(t.pubkey)}</span>
                <span>·</span>
                <span>{fmtDate(t.created_at)} {fmtTime(t.created_at)}</span>
                {(msgs[t.id]?.length||0)>0&&<span className="tcnt">💬 {msgs[t.id].length}</span>}
              </div>
            </div>
          ))}
        </div>
        {/* FAB */}
        <button className="fab" onClick={()=>setShowNew(true)}>＋</button>
      </>}

      {/* Chat view */}
      {tab==='chat'&&<>
        <div className="chat">
          {activeMsgs.length===0?(
            <div className="empty">
              <div className="eico">💬</div>
              <div>Пока нет сообщений.<br/>Напиши первым!</div>
            </div>
          ):activeMsgs.map(msg=>{
            const isOwn=msg.pubkey===kp.pubkey;
            const ci=msg.content.indexOf(': ');
            const author=ci>0?msg.content.slice(0,ci):shortKey(msg.pubkey);
            const body=ci>0?msg.content.slice(ci+2):msg.content;
            return(
              <div key={msg.id} className={`bwrap ${isOwn?'own':''}`}>
                <div className={`bauth ${isOwn?'own':''}`}>{author}</div>
                <div className={`bubble ${isOwn?'own':'other'}`}>{body}</div>
                <div className="btime">{fmtTime(msg.created_at)}</div>
              </div>
            );
          })}
          <div ref={chatEndRef}/>
        </div>
        <div className="iarea">
          <textarea className="ibox" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={handleKey} placeholder="Сообщение…" rows={1}/>
          <button className="sbtn" onClick={sendMsg} disabled={sending||!input.trim()}>↑</button>
        </div>
      </>}

      {/* New thread modal */}
      {showNew&&(
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setShowNew(false)}>
          <div className="modal">
            <h3>Новая тема</h3>
            <input value={newTitle} onChange={e=>setNewTitle(e.target.value)} placeholder="Заголовок…" maxLength={80} autoFocus/>
            <textarea value={newBody} onChange={e=>setNewBody(e.target.value)} placeholder="Описание (необязательно)…" rows={3}/>
            <div className="mbtns">
              <button className="mcancel" onClick={()=>setShowNew(false)}>Отмена</button>
              <button className="mok" onClick={publishThread} disabled={sending||!newTitle.trim()}>{sending?'…':'Опубликовать'}</button>
            </div>
          </div>
        </div>
      )}
    </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
